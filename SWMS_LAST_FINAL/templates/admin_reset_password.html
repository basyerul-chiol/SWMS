{% extends "base.html" %}

{% block title %}Reset Employee Password | SWMS{% endblock %}

{% block content %}
<style>
    .reset-page {
        max-width: 720px;
        margin: 0 auto;
    }

    .reset-card {
        background: #ffffff;
        border: 1px solid #dfe6f1;
        border-radius: 20px;
        padding: 28px;
    }

    .employee-summary {
        margin: 18px 0 24px;
        padding: 16px;
        border-radius: 14px;
        background: #f8fafc;
    }

    .employee-summary strong,
    .employee-summary span {
        display: block;
    }

    .employee-summary span {
        margin-top: 4px;
        color: #64748b;
    }

    .reset-form {
        display: grid;
        gap: 18px;
    }

    .reset-field {
        display: grid;
        gap: 8px;
    }

    .reset-field label {
        font-size: 14px;
        font-weight: 700;
    }

    .reset-field input {
        width: 100%;
        box-sizing: border-box;
        padding: 13px 14px;
        border: 1px solid #cfd8e6;
        border-radius: 12px;
        font: inherit;
    }

    .reset-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    .reset-btn {
        min-height: 44px;
        padding: 0 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .reset-btn--secondary {
        color: #334155;
        background: #ffffff;
        border-color: #cfd8e6;
    }

    .reset-btn--danger {
        color: #ffffff;
        background: #dc2626;
    }
</style>

<section class="reset-page">
    <div class="reset-card">
        <p class="eyebrow">ADMIN SECURITY</p>
        <h2>Reset employee password</h2>

        <div class="employee-summary">
            <strong>{{ employee.name }}</strong>
            <span>{{ employee.email }}</span>
            <span>{{ employee.employee_id }}</span>
        </div>

        <form
            method="POST"
            action="{{ url_for('admin_reset_employee_password', employee_id=employee.id) }}"
            class="reset-form"
        >
            <div class="reset-field">
                <label for="new_password">New password</label>
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    minlength="8"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="reset-field">
                <label for="confirm_password">Confirm new password</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    minlength="8"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="reset-actions">
                <a
                    href="{{ url_for('admin_dashboard', section='employees') }}"
                    class="reset-btn reset-btn--secondary"
                >
                    Cancel
                </a>

                <button type="submit" class="reset-btn reset-btn--danger">
                    Reset Password
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
