<div class="notification-centre" data-notification-centre>
    <button class="notification-button" type="button" aria-label="Notifications" aria-expanded="false" data-notification-toggle>
        <span aria-hidden="true">🔔</span>
        {% if unread_notification_count %}<span class="notification-badge">{{ unread_notification_count }}</span>{% endif %}
    </button>
    <div class="notification-menu" hidden data-notification-menu>
        <div class="notification-menu__header">
            <div><strong>Notifications</strong><span>{{ unread_notification_count }} unread</span></div>
            {% if user_notifications %}
            <form method="post" action="{{ url_for('mark_all_notifications_read') }}"><button type="submit" class="text-button">Mark all read</button></form>
            {% endif %}
        </div>
        <div class="notification-list">
            {% for note in user_notifications[:8] %}
            <form method="post" action="{{ url_for('mark_notification_read', notification_id=note.id) }}">
                <button type="submit" class="notification-item {% if not note.get('read', false) %}notification-item--unread{% endif %}">
                    <span class="notification-item__icon">{{ '✓' if note.get('read', false) else '•' }}</span>
                    <span><strong>{{ note.get('title', note.get('channel', 'Notification')) }}</strong><small>{{ note.get('detail', '') }}</small><time>{{ note.get('created_at', '') }}</time></span>
                </button>
            </form>
            {% else %}<div class="notification-empty">You are all caught up.</div>{% endfor %}
        </div>
    </div>
</div>
